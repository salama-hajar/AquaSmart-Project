<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaSmart | Premium Water Tracker</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M50 5 C50 5 15 50 15 75 A 35 35 0 0 0 85 75 C85 50 50 5 50 5 Z' fill='%2300d4ff'/><circle cx='50' cy='65' r='10' fill='%23ffffff' opacity='0.9'/></svg>" type="image/svg+xml">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #004e92);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bubbles {
            position: absolute; width: 100%; height: 100%; z-index: -1; overflow: hidden; top: 0; left: 0; pointer-events: none;
        }

        .bubble {
            position: absolute; bottom: -100px; width: 20px; height: 20px; background: rgba(255, 255, 255, 0.2); border-radius: 50%; animation: float 10s infinite ease-in;
        }

        .bubble:nth-child(1) { left: 10%; width: 40px; height: 40px; animation-duration: 8s; }
        .bubble:nth-child(2) { left: 20%; width: 20px; height: 20px; animation-duration: 5s; animation-delay: 1s; }
        .bubble:nth-child(3) { left: 35%; width: 50px; height: 50px; animation-duration: 10s; animation-delay: 2s; }
        .bubble:nth-child(4) { left: 50%; width: 30px; height: 30px; animation-duration: 7s; animation-delay: 0s; }
        .bubble:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-duration: 6s; animation-delay: 3s; }
        .bubble:nth-child(6) { left: 80%; width: 45px; height: 45px; animation-duration: 12s; animation-delay: 1s; }
        .bubble:nth-child(7) { left: 90%; width: 25px; height: 25px; animation-duration: 9s; animation-delay: 2s; }

        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(-1000px) scale(1.5); opacity: 0; }
        }

        header { margin-top: 20px; text-align: center; }
        header span { color: #00d4ff; }

        .container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; width: 90%; max-width: 1000px; margin-top: 40px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center; flex: 1; min-width: 300px;
        }

        .water-jar-container { display: flex; justify-content: center; margin: 30px 0; }
        .water-jar {
            width: 220px; height: 220px; background: rgba(255, 255, 255, 0.05); border: 4px solid #00d4ff; border-radius: 50%;
            position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(0, 212, 255, 0.4);
        }

        .wave {
            position: absolute; width: 200%; height: 200%; background: rgba(0, 212, 255, 0.6); border-radius: 40%;
            left: -50%; top: 100%; animation: spin 6s linear infinite; transition: top 1.5s ease-in-out; box-shadow: inset 0 0 50px rgba(0,0,0,0.2);
        }
        .wave:nth-child(2) { background: rgba(0, 150, 255, 0.8); border-radius: 45%; animation: spin 4s linear infinite; }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .percentage-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .btn-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }

        button {
            background: linear-gradient(135deg, #00d4ff, #0072ff); color: white; border: none; padding: 12px 25px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }
        button:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.6); }

        .btn-reset { background: linear-gradient(135deg, #ff416c, #ff4b2b); box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4); margin-top: 15px; }
        .btn-reset:hover { box-shadow: 0 8px 25px rgba(255, 65, 108, 0.6); }

        footer { margin-top: auto; padding: 20px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="bubbles">
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
        <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
    </div>

    <header>
        <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 5px; flex-direction: column;">
            
            <svg viewBox="0 0 120 120" style="width: 90px; height: 90px; filter: drop-shadow(0 0 15px rgba(0,212,255,0.7));" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="healthyGrad" x1="0" y1="1" x2="1" y2="0">
                        <stop offset="0%" stop-color="#0072ff"/>
                        <stop offset="100%" stop-color="#00d4ff"/>
                    </linearGradient>
                </defs>
                
                <path d="M60 10 A50 50 0 0 1 110 60 A50 50 0 0 1 60 110 A50 50 0 0 1 10 60 A50 50 0 0 1 60 10" stroke="url(#healthyGrad)" stroke-width="4" fill="none" opacity="0.6"/>
                
                <path d="M60 25 L75 45 C80 50 80 60 75 65 L60 85 L45 65 C40 60 40 50 45 45 Z" fill="url(#healthyGrad)" stroke="#ffffff" stroke-width="2"/>
                
                <circle cx="60" cy="20" r="7" fill="#ffffff"/>
                
                <path d="M48 45 Q40 35 52 30" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none"/>
                <path d="M52 30 L60 25" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none"/> <path d="M60 85 L70 105 L50 105 Z" fill="url(#healthyGrad)" stroke="#ffffff" stroke-width="2"/>

                <path d="M85 30 L85 35 M82 33 L88 33" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            
            <h1 style="font-size: 2.8rem; margin: 10px 0 0; text-shadow: 0 0 15px rgba(0, 212, 255, 0.8);">Aqua<span style="color: #00d4ff;">Smart</span> 💧</h1>
        </div>
        <p style="margin-top: 5px;">Projet Innovant - Filières ID & RCIA</p>
    </header>

    <div class="container">
        <div class="glass-card">
            <h2>Consommation du Jour</h2>
            <p>Objectif : 2500 ml</p>
            
            <div class="water-jar-container">
                <div class="water-jar">
                    <div class="wave" id="wave1"></div>
                    <div class="wave" id="wave2"></div>
                    <div class="percentage-text" id="percentage">0%</div>
                </div>
            </div>

            <h3 style="margin-bottom: 20px;"><span id="current-amount">0</span> / 2500 ml</h3>

            <div class="btn-group">
                <button onclick="addWater(250)">+ 250 ml 🥤</button>
                <button onclick="addWater(500)">+ 500 ml 🍾</button>
            </div>
            <button class="btn-reset" onclick="resetWater()">Réinitialiser 🔄</button>
        </div>

        <div class="glass-card">
            <h2>Analyse Hebdomadaire</h2>
            <canvas id="waterChart"></canvas>
        </div>
    </div>

    <footer>
        &copy; 2026 - Mini-projet Web - EST Kelaa des Sraghna
    </footer>

    <script>
        const GOAL = 2500;
        let currentWater = localStorage.getItem('aquaSmart_water') ? parseInt(localStorage.getItem('aquaSmart_water')) : 0;
        let myChart;

        // تهيئة الأصوات (الفخامة)
        const soundWaterDrop = new Audio('https://actions.google.com/sounds/v1/water/water_leak.ogg');
        const soundSuccess = new Audio('https://actions.google.com/sounds/v1/cartoon/cartoon_success_fanfare.ogg');

        updateUI();
        initChart();

        function addWater(amount) {
            if(currentWater >= GOAL) {
                Swal.fire({
                    icon: 'info', title: 'Objectif déjà atteint!', text: 'Vous êtes bien hydraté pour aujourd\'hui.',
                    background: '#1e293b', color: '#fff', confirmButtonColor: '#00d4ff'
                });
                return;
            }

            // تشغيل صوت قطرة الماء
            soundWaterDrop.currentTime = 0; 
            soundWaterDrop.play();

            currentWater += amount;
            if (currentWater >= GOAL) {
                currentWater = GOAL;
                celebrate();
            }
            
            localStorage.setItem('aquaSmart_water', currentWater);
            updateUI();
            updateChart();
        }

        function resetWater() {
            Swal.fire({
                title: 'Êtes-vous sûr?', text: "Vous allez remettre le compteur à zéro!", icon: 'warning',
                showCancelButton: true, confirmButtonColor: '#ff416c', cancelButtonColor: '#475569',
                confirmButtonText: 'Oui, réinitialiser', cancelButtonText: 'Annuler', background: '#1e293b', color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    currentWater = 0; localStorage.setItem('aquaSmart_water', 0); updateUI(); updateChart();
                }
            });
        }

        function updateUI() {
            document.getElementById('current-amount').innerText = currentWater;
            let percentage = Math.round((currentWater / GOAL) * 100);
            document.getElementById('percentage').innerText = percentage + '%';
            
            let topPosition = 100 - percentage;
            if(topPosition < 5) topPosition = 5; 

            document.getElementById('wave1').style.top = topPosition + '%';
            document.getElementById('wave2').style.top = (topPosition + 2) + '%';
        }

        function celebrate() {
            // تشغيل صوت الاحتفال
            soundSuccess.play();
            Swal.fire({
                title: 'Félicitations! 🎉', text: 'Vous avez atteint votre objectif quotidien de 2.5L!', icon: 'success',
                background: '#1e293b', color: '#fff', confirmButtonColor: '#00d4ff'
            });

            var duration = 3 * 1000; var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#00d4ff', '#ffffff', '#0072ff'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00d4ff', '#ffffff', '#0072ff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function initChart() {
            const ctx = document.getElementById('waterChart').getContext('2d');
            const jours = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
            const dateAujourdhui = new Date().getDay();
            const labelsDynamiques = [];
            
            for (let i = 6; i >= 0; i--) {
                let index = (dateAujourdhui - i + 7) % 7; labelsDynamiques.push(jours[index]);
            }

            Chart.defaults.color = 'rgba(255, 255, 255, 0.7)';
            Chart.defaults.font.family = "'Poppins', sans-serif";

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labelsDynamiques,
                    datasets: [{
                        label: 'Hydratation (ml)',
                        data: [1500, 2000, 1800, 2500, 2100, 1900, currentWater],
                        backgroundColor: 'rgba(0, 212, 255, 0.6)', borderColor: '#00d4ff', borderWidth: 1, borderRadius: 8, hoverBackgroundColor: 'rgba(0, 212, 255, 0.9)'
                    }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true, max: 3000, grid: { color: 'rgba(255, 255, 255, 0.1)' } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
            });
        }

        function updateChart() {
            myChart.data.datasets[0].data[6] = currentWater; myChart.update();
        }
    </script>
</body>
</html>
